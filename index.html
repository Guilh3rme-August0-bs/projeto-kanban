<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="src/css/kanban.css">

    <title>Kanban</title>
</head>

<body>
    <main class="kanban">

        <!-- COLUNA 1 -->

        <div class="kanban-column" data-id="1">
            <div class="kanban-title">
                <h2>
                    Pendente
                </h2>
                <div class="column-buttons">
                    <button class="edit-column">
                       <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                    <button class="add-card">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
            </div>

            <div class="kanban-cards">

                <div class="kanban-card" draggable="true">
                    <div class="cabecalho-card">
                        <div class="badge high">
                            <span>Alta Prioridade</span>
                        </div>

                        <button class="options">
                            <i class="fa-solid fa-ellipsis-vertical"></i>
                        </button>
                    </div>
                    <p class="card-title">Criação de novas tabelas no banco</p>
                    <div class="card-infos">
                        <div class="card-icons">
                            <p>
                                <i class="fa-regular fa-comment"></i>
                                1
                            </p>
                            <p>
                                <i class="fa-solid fa-paperclip"></i>
                                1
                            </p>
                        </div>

                        <div class="user">
                            <img title="Lívia Moreau"
                                src="https://d2hjqjt7v9ypmr.cloudfront.net/wp-content/uploads/2024/11/ai-avatar-generator-realistic-smiling-girl.webp"
                                alt="Lívia Moreau">
                        </div>

                    </div>
                </div>
            </div>

        </div>
        </div>

        <!-- COLUNA 2 -->

        <div class="kanban-column" data-id="2">
            <div class="kanban-title">
                <h2>
                    Em desenvolvimento
                </h2>
                <div class="column-buttons">
                    <button class="edit-column">
                       <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                    <button class="add-card">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
            </div>

            <div class="kanban-cards">
                <div class="kanban-card" draggable="true">
                    <div class="cabecalho-card">
                        <div class="badge high">
                            <span>Alta Prioridade</span>
                        </div>

                        <button class="options">
                            <i class="fa-solid fa-ellipsis-vertical"></i>
                        </button>
                    </div>

                    <p class="card-title">Construção do Backend</p>
                    <div class="card-infos">
                        <div class="card-icons">
                            <p>
                                <i class="fa-regular fa-comment"></i>
                                1
                            </p>
                            <p>
                                <i class="fa-solid fa-paperclip"></i>
                                1
                            </p>
                        </div>

                        <div class="user">
                            <img title="Marco Bianchi" src="https://mockmind-api.uifaces.co/content/human/80.jpg"
                                alt="Marco Bianchi">
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- COLUNA 3 -->

        <div class="kanban-column" data-id="3">
            <div class="kanban-title">
                <h2>
                    Teste de homologação
                </h2>
                <div class="column-buttons">
                    <button class="edit-column">
                       <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                    <button class="add-card">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
            </div>

            <div class="kanban-cards">
                <div class="kanban-card" draggable="true">
                    <div class="cabecalho-card">
                        <div class="badge medium">
                            <span>Média Prioridade</span>
                        </div>

                        <button class="options">
                            <i class="fa-solid fa-ellipsis-vertical"></i>
                        </button>
                    </div>

                    <p class="card-title">Teste de Usabilidade</p>
                    <div class="card-infos">
                        <div class="card-icons">
                            <p>
                                <i class="fa-regular fa-comment"></i>
                                1
                            </p>
                            <p>
                                <i class="fa-solid fa-paperclip"></i>
                                1
                            </p>
                        </div>

                        <div class="user">
                            <img title="Daniel Whitaker"
                                src="https://uibreakfast.com/wp-content/uploads/2023/06/dan_lacivita.jpg"
                                alt="Daniel Whitaker">
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- COLUNA 4 -->

        <div class="kanban-column" data-id="4">
            <div class="kanban-title">
                <h2>
                    Em produção
                </h2>
                <div class="column-buttons">
                    <button class="edit-column">
                       <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                    <button class="add-card">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
            </div>

            <div class="kanban-cards">
                <div class="kanban-card" draggable="true">
                    <div class="cabecalho-card">
                        <div class="badge low">
                            <span>Baixa Prioridade</span>
                        </div>

                        <button class="options">
                            <i class="fa-solid fa-ellipsis-vertical"></i>
                        </button>
                    </div>

                    <p class="card-title">Reformulação da Interface</p>
                    <div class="card-infos">
                        <div class="card-icons">
                            <p>
                                <i class="fa-regular fa-comment"></i>
                                1
                            </p>
                            <p>
                                <i class="fa-solid fa-paperclip"></i>
                                1
                            </p>
                        </div>

                        <div class="user">
                            <img title="Sofia Lindström"
                                src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR5EVSZ-bOAdYkS2_eJeV2RwCBZvgsx6gpmlQ&s"
                                alt="Sofia Lindström">
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!--BOTÃO DE ADICIONAR COLUNA-->

        <div class="add_column_div">


            <button class="add-column" id="add-column-button" onclick="criarColuna()">
                <i class="fa-solid fa-circle-plus"></i>
            </button>
        </div>

    </main>

    <script src="src/javascript/kanban.js"></script>

</body>

</html>
